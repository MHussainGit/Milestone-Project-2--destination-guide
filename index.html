<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta tags for search engines -->
    <meta name="description"
        content="Destination Guide: search your next holiday destination and explore attractions, accommodations, and restaurants.">
    <meta name="keywords" content="holiday, travel, destinations, attractions, hotels, historic sites, vacation">
    <title>Destination Guide</title>
    <link rel="icon" sizes="180x180" type="image/png" href="assets/favicon/travel.webp">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="assets/css/styles.css">
    <!-- Google Fonts & Bootstrap retained -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-..." crossorigin="anonymous">
</head>

<body>
    <!-- Header -->
    <header class="bg-primary text-white">
        <nav class="navbar navbar-expand-lg navbar-dark container">
            <a class="navbar-brand" href="index.html">Destination Guide</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="destinations.html"> Popular Destinations</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- Main content -->
    <main class="container-fluid p-0">
        <section id="hero">
            <div id="cover-text">
                <h2>Welcome to Destination Guide</h2>
                <h3>Search your next holiday destination to explore attractions, accommodation and historic sites</h3>
                <!-- Search Form -->
                <form id="searchForm" class="row g-3" autocomplete="off">
                    <div class="col-auto">
                        <label for="cityInput" class="visually-hidden">City</label>
                        <input list="citySuggestions" type="text" class="form-control" id="cityInput" placeholder="Search a City/Country">
                        <datalist id="citySuggestions">
                            <!-- Suggestions populated by JS -->
                        </datalist>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary mb-3">Search</button>
                    </div>
                </form>
            </div>
        </section>
        <div id="results"></div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container text-center">
            &copy; 2026 Destination Guide. All rights reserved.
        </div>
    </footer>

    <!-- Bootstrap JS bundle and app -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-..." crossorigin="anonymous"></script>
    <script src="assets/js/app.js"></script>
</body>

</html>
